
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">
    <!-- JS Link -->
    <!-- <script src="app.js" defer></script> -->
    <!-- IMPORT GOOGLE ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <main class="main-container">

        <!-- HEADER -->
        <header class="input-container">
            <input type="text" name="city" id="city" class="city-input" placeholder="Search City">
            <button class="search-btn">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </header>

        <!-- WEATHER ALL INFO -->
        <section class="Weather-info" style="display: none;">

            <!-- LOCATION -->
            <div class="location-date-container">
                <div class="location">
                    <i class="fa-solid fa-location-dot"></i>
                    <h4 class="location-txt">Jakarta</h4>                    
                </div>
                <h5 class="current-date-txt regular-txt">Wed, 08 Aug</h5>            
            </div>

            <!-- WEATHER SUMMARY -->
            <div class="weather-summary-container">
                <img src="images/weather-cloud.svg" alt="⛅" class="weather-summary-img">
                <div class="weather-summary-info">
                    <h1 class="tmep-txt">28 ℃</h1>
                    <h3 class="condition-txt regular-txt">clouds</h3>
                </div>
            </div>

            <!-- WEATHER CONDITION -->
            <div class="weather-conditions-container">
                <div class="condition-item">
                    <i class="fa-solid fa-droplet"></i>
                </div>
                <div class="condition-info">
                    <h5 class="regular-txt">Humidity</h5>
                    <h5 class="humidity-value-txt">44%</h5>
                </div>

                <div class="condition-item">
                    <i class="fa-solid fa-wind"></i>
                </div>
                <div class="condition-info">
                    <h5 class="regular-txt">Wind Speed</h5>
                    <h5 class="wind-value-txt">2 M/s</h5>
                </div>
            </div>

            <!-- FORCAST ITEMS -->
            <div class="forecast-items-container">
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="images/weather-color-moon-cloud-light-svgrepo-com.svg" alt="🌧" class="forecast-item-img">
                    <h5 class="forecast-item-temp">22 ℃</h5>
                </div>
                
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="images/weather-color-moon-cloud-light-svgrepo-com.svg" alt="🌧" class="forecast-item-img">
                    <h5 class="forecast-item-temp">22 ℃</h5>
                </div>
                
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="images/weather-color-moon-cloud-light-svgrepo-com.svg" alt="🌧" class="forecast-item-img">
                    <h5 class="forecast-item-temp">22 ℃</h5>
                </div>
                
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="images/weather-color-moon-cloud-light-svgrepo-com.svg" alt="🌧" class="forecast-item-img">
                    <h5 class="forecast-item-temp">22 ℃</h5>
                </div>
                
            </div>

        </section>

        <!-- SEARCH CITY -->
        <section class="search-city section-message" style="display:n;">
             <img src="images/undraw_searching_no1g.svg" alt="🔕" >
             <div>
                <h1>Search City</h1>
                <h4 class="regular-txt">
                    Find out the weather condition of the city
                </h4>
             </div>
        </section>

        <!-- NOT FOUND -->
        <section class="not-found section-message" style="display: none;" >
             <img src="images/undraw_page-not-found_6wni.svg" alt="🧐" >
             <div>
                <h1>Search City</h1>
                <h4 class="regular-txt">
                    Find out the weather condition of the city
                </h4>
             </div>
        </section>

    </main>

</body>
</html>
